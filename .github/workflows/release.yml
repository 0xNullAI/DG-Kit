name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
          commit: 'chore: release @dg-kit/*'
          title: 'chore: release @dg-kit/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance signs the published tarball with the workflow's
          # short-lived OIDC identity so consumers can verify the package
          # was built from this exact commit. See:
          # https://docs.npmjs.com/generating-provenance-statements
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Release summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          {
            echo "## ✅ Released to npm"
            echo ""
            echo "Published packages:"
            echo ""
            echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | "- \(.name)@\(.version) → https://www.npmjs.com/package/\(.name)/v/\(.version)"'
          } >> "$GITHUB_STEP_SUMMARY"
